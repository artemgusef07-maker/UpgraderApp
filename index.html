<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Upgrader</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="phone-wrapper">
        <!-- Top Sticky Header -->
        <div class="app-header">
            <div class="u-coin-balance">
                <span class="coin-logo">U</span>
                <span id="balanceDisplay">100.0</span>
            </div>
            <button class="cache-purge-btn" onclick="clearLegacyData()">🔄 Reset</button>
        </div>

        <!-- TAB 1: TAP & CASES -->
        <div id="clickerTab" class="tab-pane active">
            <div class="tap-zone">
                <button class="tap-sphere" onclick="clickCoin()">👾</button>
                <div class="tap-hint">⚡ +0.1 per tap</div>
            </div>

            <div class="section-divider">🛒 SELECT CASE</div>
            <div id="caseMenuGrid" class="case-selection-grid"></div>
        </div>

        <!-- TAB 2: UPGRADER -->
        <div id="upgraderTab" class="tab-pane">
            <div class="upgrader-deck">
                <div class="chance-readout"><span id="chanceDisplay">0.00%</span> Win Chance</div>
                
                <div class="dial-container">
                    <div id="upgraderWheel" class="dial-ring">
                        <div id="wheelPointer" class="dial-needle"></div>
                        <div class="dial-core"></div>
                    </div>
                </div>

                <label class="instant-mode-toggle">
                    <input type="checkbox" id="fastUpgrade">
                    <span>⚡ Instant (Skip Spin)</span>
                </label>

                <button class="action-trigger purple-theme" onclick="attemptUpgrade()" id="upgradeBtn">START UPGRADE</button>
            </div>

            <div class="section-divider">🎯 STAGING DOCK</div>
            <div class="staging-dock">
                <div id="stageWager" class="dock-slot empty">Select Wager</div>
                <div class="dock-arrow">➔</div>
                <div id="stageTarget" class="dock-slot empty">Select Target</div>
            </div>

            <div class="section-divider">🎒 YOUR SHELF</div>
            <div id="wagerGrid" class="item-grid-shelf"></div>

            <div class="section-divider">🏬 TARGET SHOWROOM</div>
            <div id="targetGrid" class="item-grid-shelf"></div>
        </div>

        <!-- TAB 3: INVENTORY & PROFILE -->
        <div id="profileTab" class="tab-pane">
            <div class="dashboard-stats">
                <div class="stat-card">
                    <span class="sc-val" id="statUpgrades">0</span>
                    <span class="sc-lbl">Upgrades</span>
                </div>
                <div class="stat-card">
                    <span class="sc-val" id="statItemsCount">0</span>
                    <span class="sc-lbl">Items</span>
                </div>
            </div>
            
            <div class="section-divider">🎒 FULL INVENTORY</div>
            <div id="profileInventory" class="item-grid-shelf"></div>
            
            <div class="section-divider">🏆 ALL-TIME BEST</div>
            <div id="leaderboardList" class="item-grid-shelf"></div>
        </div>

        <!-- SMOOTH HORIZONTAL ROLLER MODAL (No overlapping text) -->
        <div id="unboxingModal" class="modal-backdrop">
            <div class="roller-window">
                <div class="roller-title" id="rollerCaseTitle">Opening Case...</div>
                
                <div class="roller-viewport">
                    <div class="roller-center-line"></div>
                    <div id="rollerTape" class="roller-tape"></div>
                </div>

                <div id="rollerResultCard" class="roller-result-card">
                    <div id="resultEmoji" style="font-size: 48px;">👾</div>
                    <div id="resultName" style="font-weight: bold; margin: 5px 0;">Item Name</div>
                    <div id="resultValue" style="color: #ffca28; font-size: 14px;">0 U</div>
                </div>

                <button class="modal-claim-btn" id="modalClaimBtn" onclick="closeUnboxModal()">COLLECT</button>
            </div>
        </div>

        <!-- Bottom Navigation Bar -->
        <div class="bottom-navigation-dock">
            <button onclick="switchTab('clickerTab')" id="btn-clickerTab" class="nav-item active">⚡ Tap</button>
            <button onclick="switchTab('upgraderTab')" id="btn-upgraderTab" class="nav-item">🔄 Upgrade</button>
            <button onclick="switchTab('profileTab')" id="btn-profileTab" class="nav-item">👤 Profile</button>
        </div>
    </div>

    <script src="items.js"></script>
    <script src="app.js"></script>
</body>
</html>
