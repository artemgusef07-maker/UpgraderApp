<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sleek Simulator</title>
    <!-- Official Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Cache Buster to force updates -->
    <link rel="stylesheet" href="style.css?v=5">
</head>
<body>

    <div class="app-wrapper">
        
        <!-- HEADER -->
        <div class="app-header">
            <div class="balance-box">
                <span>🪙</span><span id="balanceDisplay">0.0</span><span>U</span>
            </div>
            <div class="header-controls">
                <button class="btn-action" onclick="openIndexModal()">🎴 INDEX</button>
                <button class="btn-action btn-reset" onclick="clearLegacyData()">RESET</button>
            </div>
        </div>

        <!-- TABS BAR -->
        <div class="nav-tabs-bar">
            <button id="btn-casesTab" class="tab-trigger" onclick="switchTab('casesTab')">📦 CASES</button>
            <button id="btn-upgraderTab" class="tab-trigger" onclick="switchTab('upgraderTab')">⚡ UPGRADER</button>
            <button id="btn-profileTab" class="tab-trigger active" onclick="switchTab('profileTab')">🎒 INVENTORY</button>
        </div>

        <!-- VIEWPORTS -->
        <div class="tab-viewport">
            
            <!-- CASES PANEL -->
            <div id="casesTab" class="tab-view">
                <div id="caseMenuGrid" class="display-grid"></div>
            </div>

            <!-- UPGRADER PANEL -->
            <div id="upgraderTab" class="tab-view">
                <div class="upgrader-suite">
                    <div class="docking-bay">
                        <div id="stageWager" class="dock-slot empty">Select Wager</div>
                        <div id="stageTarget" class="dock-slot empty">Select Target</div>
                    </div>
                    <div class="engine-deck">
                        <div class="deck-column">
                            <span class="deck-title">Wagers</span>
                            <div id="wagerGrid" class="scroll-tray"></div>
                        </div>
                        <div class="radar-center-hub">
                            <div id="upgraderWheel" class="circular-radar">
                                <div id="wheelPointer" class="radar-indicator-needle"></div>
                                <div class="radar-inner-shield">
                                    <span id="chanceDisplay">0.00%</span>
                                    <span style="font-size: 9px; color: var(--text-muted); text-transform: uppercase;">Win Odds</span>
                                </div>
                            </div>
                            <div class="control-row">
                                <button class="btn-preset" onclick="applyPresetMultiplier(2)">2x</button>
                                <button class="btn-preset" onclick="applyPresetMultiplier(5)">5x</button>
                                <button class="btn-preset" onclick="applyPresetMultiplier(10)">10x</button>
                            </div>
                            <div class="control-row">
                                <button class="btn-preset" onclick="applyPresetChance(35)">35%</button>
                                <button class="btn-preset" onclick="applyPresetChance(55)">55%</button>
                                <button class="btn-preset" onclick="applyPresetChance(75)">75%</button>
                            </div>
                        </div>
                        <div class="deck-column">
                            <span class="deck-title">Targets</span>
                            <div id="targetGrid" class="scroll-tray"></div>
                        </div>
                    </div>
                    <div class="execution-block">
                        <button id="upgradeBtn" class="btn-trigger-launch" onclick="attemptUpgrade()" disabled>⚡ ROLL UPGRADE</button>
                        <div style="display:flex; justify-content:center; gap:6px; font-size:12px; color:var(--text-muted);">
                            <input type="checkbox" id="fastUpgrade" style="cursor:pointer;">
                            <label style="cursor:pointer;" for="fastUpgrade">Fast Upgrade</label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- INVENTORY PANEL -->
            <div id="profileTab" class="tab-view active-view">
                <div class="generator-station">
                    <div class="interactive-coin" onclick="clickCoin()">🪙</div>
                    <div class="metrics-grid">
                        <div style="text-align:center;">Upgrades<span id="statUpgrades" class="metric-value">0</span></div>
                        <div style="text-align:center;">Items<span id="statItemsCount" class="metric-value">0</span></div>
                    </div>
                </div>
                <div style="font-size: 11px; font-weight: 700; margin-bottom: 8px; color: var(--text-muted); text-transform:uppercase;">Storage Backpack:</div>
                <div id="profileInventory" class="display-grid" style="grid-template-columns: repeat(3, 1fr); gap:6px; max-height: 280px; overflow-y: auto; background:rgba(0,0,0,0.15); padding:8px; border-radius:var(--radius);"></div>
            </div>

        </div>
    </div>

    <!-- MODALS -->
    <div id="caseDetailsModal" class="modal-overlay" style="display:none;">
        <div class="modal-panel">
            <div id="inspectCaseName" class="roller-title" style="font-size:16px; font-weight:700; text-align:center; margin-bottom:12px;">Inspection</div>
            <div class="scroll-list-panel" id="inspectItemsList"></div>
            <button class="btn-modal-primary" style="background:var(--accent-gold); color:#000;" onclick="confirmCasePurchase()">
                ACQUIRE FOR <span id="totalCaseCostDisplay">0</span> U
            </button>
            <button class="btn-modal-cancel" onclick="closeInspectModal()">DISMISS</button>
        </div>
    </div>

    <div id="unboxingModal" class="modal-overlay" style="display:none;">
        <div class="modal-panel" style="max-width:440px;">
            <div id="rollerCaseTitle" class="roller-title" style="font-size:15px; font-weight:700; text-align:center; margin-bottom:12px;">Processing...</div>
            <div id="multiRollersWrapper"></div>
            <div id="multiResultsContainer" class="rewards-matrix-box"></div>
            <div id="modalClaimBtn" style="margin-top:16px; display:none;">
                <button class="btn-modal-primary" onclick="closeUnboxModal()">TRANSFER TO BACKPACK</button>
            </div>
        </div>
    </div>

    <div id="itemIndexModal" class="modal-overlay" style="display:none; z-index:9999;">
        <div class="modal-panel" style="max-width:420px; max-height:80vh; display:flex; flex-direction:column;">
            <div class="roller-title" style="font-size:16px; font-weight:700; text-align:center; margin-bottom:16px;">Item Archive</div>
            <div id="indexGrid" style="display:grid; grid-template-columns: repeat(4, 1fr); gap: 6px; overflow-y:auto; flex:1;"></div>
            <button class="btn-modal-cancel" onclick="closeIndexModal()" style="margin-top:16px;">CLOSE</button>
        </div>
    </div>

    <script src="item.js?v=5"></script>
    <script src="app.js?v=5"></script>
</body>
</html>
