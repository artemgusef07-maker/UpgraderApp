<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber-Emoji Upgrader</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="header">
        <div class="balance-pill">💰 <span id="balanceDisplay">100.0</span> U-Coins</div>
    </div>

    <div class="nav">
        <button onclick="switchTab('clickerTab')" id="btn-clickerTab" class="active">⚡ Tap</button>
        <button onclick="switchTab('upgraderTab')" id="btn-upgraderTab">🔄 Upgrade</button>
        <button onclick="switchTab('profileTab')" id="btn-profileTab">👤 Inventory</button>
    </div>

    <!-- CLICKER TAB -->
    <div id="clickerTab" class="tab-content active">
        <div class="card clicker-container">
            <button class="clicker-btn" onclick="clickCoin()">👾</button>
            <p style="color: #888; font-size: 14px;">+0.1 U-Coin per tap</p>
            <button class="btn purchase-btn" onclick="buyCase()">📦 Open Emoji Capsule (10 U-Coins)</button>
        </div>
    </div>

    <!-- UPGRADER TAB -->
    <div id="upgraderTab" class="tab-content">
        <!-- Visual Wheel -->
        <div class="card wheel-card">
            <h2 class="chance-header">Win Chance: <span id="chanceDisplay">0.00%</span></h2>
            <div class="wheel-container">
                <div id="upgraderWheel" class="wheel">
                    <div id="wheelPointer" class="pointer"></div>
                    <div class="wheel-center"></div>
                </div>
            </div>
            <div class="toggle-container">
                <input type="checkbox" id="fastUpgrade"> 
                <label for="fastUpgrade">⚡ Instant Result (Skip Animation)</label>
            </div>
            <button class="btn action-btn" onclick="attemptUpgrade()" id="upgradeBtn">START UPGRADE</button>
        </div>

        <h3>1. Select Your Wager Item:</h3>
        <div id="wagerGrid" class="selection-grid"></div>

        <h3>2. Select Your Target Prize:</h3>
        <div id="targetGrid" class="selection-grid"></div>
    </div>

    <!-- PROFILE TAB -->
    <div id="profileTab" class="tab-content">
        <div class="card stats-card">
            <div>📊 Upgrades: <strong id="statUpgrades">0</strong></div>
        </div>
        
        <h3>Your Collection</h3>
        <div id="profileInventory" class="inventory-grid"></div>
        
        <h3>🏆 Personal Best Pulls</h3>
        <div id="leaderboardList" class="inventory-grid"></div>
    </div>

    <script src="items.js"></script>
    <script src="app.js"></script>
</body>
</html>
