<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber-Emoji Upgrader</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <!-- Top Dashboard Header -->
    <div class="header">
        <div class="balance-pill">🪙 <span id="balanceDisplay">100.0</span></div>
        <button class="reset-pill" onclick="clearLegacyData()" title="Fix Cache Bugs">🔄 Reset Cache</button>
    </div>

    <!-- MAIN APP CARDS CONTAINER -->
    <div id="clickerTab" class="tab-content active">
        <div class="visual-hub">
            <button class="main-tap-sphere" onclick="clickCoin()">👾</button>
            <div class="tap-subtext">⚡ +0.1 U-Coin per tap</div>
            <button class="prime-action-button secure-green" onclick="buyCase()">
                <span class="btn-icon">📦</span>
                <span class="btn-text">Open Emoji Capsule</span>
                <span class="btn-cost">10 U</span>
            </button>
        </div>
    </div>

    <div id="upgraderTab" class="tab-content">
        <div class="engine-deck">
            <h2 class="gauge-display"><span id="chanceDisplay">0.00%</span> Chance</h2>
            
            <div class="wheel-bay">
                <div id="upgraderWheel" class="wheel">
                    <div id="wheelPointer" class="pointer"></div>
                    <div class="wheel-center"></div>
                </div>
            </div>

            <div class="control-row">
                <label class="switch-card">
                    <input type="checkbox" id="fastUpgrade">
                    <span class="switch-label">⚡ Fast Mode (Skip Spin)</span>
                </label>
            </div>

            <button class="prime-action-button secure-purple" onclick="attemptUpgrade()" id="upgradeBtn">
                🚀 COMMENCE UPGRADE
            </button>
        </div>

        <div class="deck-title">🎯 Selected Staging</div>
        <div class="staging-area">
            <div id="stageWager" class="staged-slot empty">Select Wager</div>
            <div class="staging-arrow">➔</div>
            <div id="stageTarget" class="staged-slot empty">Select Target</div>
        </div>

        <div class="deck-title">🎒 Your Inventory</div>
        <div id="wagerGrid" class="visual-shelf"></div>

        <div class="deck-title">🏬 Showroom Targets</div>
        <div id="targetGrid" class="visual-shelf"></div>
    </div>

    <div id="profileTab" class="tab-content">
        <div class="stats-dashboard">
            <div class="stat-badge">
                <span class="badge-icon">🔄</span>
                <span class="badge-val" id="statUpgrades">0</span>
                <span class="badge-lbl">Upgrades</span>
            </div>
            <div class="stat-badge">
                <span class="badge-icon">🎒</span>
                <span class="badge-val" id="statItemsCount">0</span>
                <span class="badge-lbl">Items Held</span>
            </div>
        </div>
        
        <div class="deck-title">💎 Your Full Collection</div>
        <div id="profileInventory" class="visual-shelf"></div>
        
        <div class="deck-title">🏆 All-Time Best Pulls</div>
        <div id="leaderboardList" class="visual-shelf"></div>
    </div>

    <!-- CUSTOM VISUAL POPUP MODAL (Replaces boring alerts) -->
    <div id="resultModal" class="modal-overlay">
        <div class="modal-window">
            <div id="modalBanner" class="modal-banner">SUCCESS</div>
            <div id="modalEmoji" class="modal-emoji">👾</div>
            <div id="modalItemName" class="modal-item-name">Diamond Core</div>
            <div id="modalValue" class="modal-value">250 U</div>
            <button class="modal-close-btn" onclick="closeModal()">COLLECT</button>
        </div>
    </div>

    <!-- Bottom Fixed Navigation Dock -->
    <div class="nav-dock">
        <button onclick="switchTab('clickerTab')" id="btn-clickerTab" class="dock-item active">⚡</button>
        <button onclick="switchTab('upgraderTab')" id="btn-upgraderTab" class="dock-item">🔄</button>
        <button onclick="switchTab('profileTab')" id="btn-profileTab" class="dock-item">👤</button>
    </div>

    <script src="items.js"></script>
    <script src="app.js"></script>
</body>
</html>
