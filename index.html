<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek Simulator</title>
    <!-- Linked your dedicated stylesheet here -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-wrapper">
        
        <!-- HEADER COMPONENT -->
        <div class="app-header">
            <div class="balance-box">
                <span>🪙</span><span id="balanceDisplay">500.0</span><span>U</span>
            </div>
            <div class="header-controls">
                <button class="btn-action" onclick="openIndexModal()">🎴 INDEX</button>
                <button class="btn-action btn-reset" onclick="clearLegacyData()">RESET</button>
            </div>
        </div>

        <!-- NAVIGATION CONTROLLER -->
        <div class="nav-tabs-bar">
            <button id="btn-casesTab" class="tab-trigger active" onclick="switchTab('casesTab')">📦 CASES</button>
            <button id="btn-upgraderTab" class="tab-trigger" onclick="switchTab('upgraderTab')">⚡ UPGRADER</button>
            <button id="btn-profileTab" class="tab-trigger" onclick="switchTab('profileTab')">🎒 INVENTORY</button>
        </div>

        <!-- MAIN SPAWN WINDOW -->
        <div class="tab-viewport">
            
            <!-- CASES PANEL -->
            <div id="casesTab" class="tab-view active-view">
                <div id="caseMenuGrid" class="display-grid"></div>
            </div>

            <!-- UPGRADER CONTROLLER -->
            <div id="upgraderTab" class="tab-view">
                <div class="upgrader-suite">
                    
                    <div class="docking-bay">
                        <div id="stageWager" class="dock-slot empty">Select Wager</div>
                        <div id="stageTarget" class="dock-slot empty">Select Target</div>
                    </div>

                    <div class="engine-deck">
                        <div class="deck-column">
                            <span class="deck-title">Wagers</span>
                            <div id="wagerGrid" class="scroll-tray"></div>
                        </div>

                        <div class="radar-center-hub">
                            <div id="upgraderWheel" class="circular-radar">
                                <div id="wheelPointer" class="radar-indicator-needle"></div>
                                <div class="radar-inner-shield">
                                    <span id="chanceDisplay">0.00%</span>
                                    <span style="font-size: 9px; color: var(--text-muted); text-transform: uppercase;">Win Odds</span>
                                </div>
                            </div>
                            
                            <div class="control-row">
                                <button class="btn-preset" onclick="applyPresetMultiplier(2)">2x</button>
                                <button class="btn-preset" onclick="applyPresetMultiplier(5)">5x</button>
                                <button class="btn-preset" onclick="applyPresetMultiplier(10)">10x</button>
                            </div>
                            <div class="control-row">
                                <button class="btn-preset" onclick="applyPresetChance(35)">35%</button>
                                <button class="btn-preset" onclick="applyPresetChance(55)">55%</button>
                                <button class="btn-preset" onclick="applyPresetChance(75)">75%</button>
                            </div>
                        </div>

                        <div class="deck-column">
                            <span class="deck-title">Targets</span>
                            <div id="targetGrid" class="scroll-tray"></div>
                        </div>
                    </div>

                    <div class="execution-block">
                        <button id="upgradeBtn" class="btn-trigger-launch" onclick="attemptUpgrade()">⚡ ROLL UPGRADE</button>
                        <div style="display:flex; justify-content:center; gap:6px; font-size:12px; color:var(--text-muted);">
                            <input type="checkbox" id="fastUpgrade" style="cursor:pointer;">
                            <label style="cursor:pointer;" for="fastUpgrade">Fast Upgrade (Skip Animation)</label>
                        </div>
                    </div>

                </div>
            </div>

            <!-- INVENTORY PROFILE LAYER -->
            <div id="profileTab" class="tab-view">
                <div class="generator-station">
                    <div class="interactive-coin" onclick="clickCoin()">🪙</div>
                    <div class="metrics-grid">
                        <div style="text-align:center;">Upgrades Processed<span id="statUpgrades" class="metric-value">0</span></div>
                        <div style="text-align:center;">Backpack Items<span id="statItemsCount" class="metric-value">0</span></div>
                    </div>
                </div>

                <div style="font-size: 11px; font-weight: 700; margin-bottom: 8px; color: var(--text-muted); text-transform:uppercase; letter-spacing:0.5px;">Storage Backpack:</div>
                <div id="profileInventory" class="display-grid" style="grid-template-columns: repeat(3, 1fr); gap:6px; max-height: 280px; overflow-y: auto; background:rgba(0,0,0,0.15); padding:8px; border-radius:var(--radius);"></div>
            </div>

        </div>

    </div>

    <!-- INSPECT POPUP BOX OVERLAY -->
    <div id="caseDetailsModal" class="modal-overlay" style="display:none;">
        <div class="modal-panel">
            <div id="inspectCaseName" class="roller-title" style="font-size:16px; font-weight:700; text-align:center; margin-bottom:12px;">Inspection Box</div>
            <div class="scroll-list-panel" id="inspectItemsList"></div>

            <div style="font-size: 11px; color: var(--text-muted); font-weight: 700; margin-bottom: 6px; text-transform:uppercase;">Drop Multi-Batch Value:</div>
            <div class="button-group-row">
                <button id="qty-1" class="btn-selector active" onclick="setUnboxQuantity(1)">1x</button>
                <button id="qty-2" class="btn-selector" onclick="setUnboxQuantity(2)">2x</button>
                <button id="qty-3" class="btn-selector" onclick="setUnboxQuantity(3)">3x</button>
                <button id="qty-4" class="btn-selector" onclick="setUnboxQuantity(4)">4x</button>
                <button id="qty-5" class="btn-selector" onclick="setUnboxQuantity(5)">5x</button>
            </div>

            <button class="btn-modal-primary" style="background:var(--accent-gold); color:#000;" onclick="confirmCasePurchase()">
                ACQUIRE FOR <span id="totalCaseCostDisplay">0</span> U
            </button>
            <button class="btn-modal-cancel" onclick="closeInspectModal()">DISMISS</button>
        </div>
    </div>

    <!-- MACHINE CALCULATOR DISPLAY UNBOX SYSTEM -->
    <div id="unboxingModal" class="modal-overlay" style="display:none;">
        <div class="modal-panel" style="max-width:440px;">
            <div id="rollerCaseTitle" class="roller-title" style="font-size:15px; font-weight:700; text-align:center; margin-bottom:12px;">Unboxing Processing...</div>
            <div id="multiRollersWrapper"></div>
            <div id="multiResultsContainer" class="rewards-matrix-box"></div>
            <div id="modalClaimBtn" style="margin-top:16px; display:none;">
                <button class="btn-modal-primary" onclick="closeUnboxModal()">TRANSFER TO BACKPACK</button>
            </div>
        </div>
    </div>

    <!-- BOOK INDEX MODAL -->
    <div id="itemIndexModal" class="modal-overlay" style="display:none; z-index:9999;">
        <div class="modal-panel" style="max-width:420px; max-height:80vh; display:flex; flex-direction:column;">
            <div class="roller-title" style="font-size:16px; font-weight:700; text-align:center; margin-bottom:4px;">Item Index Archive</div>
            <div style="color:var(--text-muted); font-size:12px; margin-bottom:16px; text-align:center;">Historical log book trackers</div>
            <div id="indexGrid" style="display:grid; grid-template-columns: repeat(4, 1fr); gap: 6px; overflow-y:auto; flex:1; padding-right:2px;"></div>
            <button class="btn-modal-cancel" onclick="closeIndexModal()" style="margin-top:16px; width:100%;">CLOSE CATALOGUE</button>
        </div>
    </div>

    <!-- LOADS DEFINED DATABASES -->
    <script src="item.js"></script>
    <script src="app.js"></script>
</body>
</html>
