<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Upgrader App</title>
    <!-- Official Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0e1015;
            --card-bg: #171921;
            --accent-yellow: #ffb700;
            --text-main: #ffffff;
            --text-secondary: #717789;
            --border-color: #232733;
            --red-outline: #ff4a4a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* --- HEADER SECTION --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 4px 0;
        }

        .balance-container {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 20px;
            font-weight: 700;
        }

        .coin-icon {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, #e0e0e0, #8a8a8a);
            border-radius: 50%;
            display: inline-block;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.4);
        }

        .header-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-badge {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-reset {
            border-color: rgba(255, 74, 74, 0.4);
            color: var(--red-outline);
        }

        /* --- NAVIGATION TABS --- */
        .nav-tabs {
            display: flex;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 4px;
            width: 100%;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 10px;
            font-size: 12px;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .tab-btn.active {
            background-color: #212431;
            color: var(--text-main);
        }

        /* --- MAIN VIEW CONTENT --- */
        .tab-content {
            display: none;
            width: 100%;
            min-height: 400px;
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border-color);
        }

        .tab-content.active {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- CASES VIEW --- */
        .cases-placeholder {
            color: var(--text-secondary);
            margin: auto;
            text-align: center;
        }

        /* --- UPGRADER VIEW --- */
        .upgrader-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            margin-bottom: 24px;
        }

        .select-box {
            background: #1c1f2b;
            border: 1px dashed var(--border-color);
            border-radius: 8px;
            padding: 16px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 13px;
        }

        .odds-circle-container {
            position: relative;
            width: 160px;
            height: 160px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
        }

        .odds-circle-svg {
            position: absolute;
            top: 0;
            left: 0;
            transform: rotate(-90deg);
        }

        .odds-text-pct {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-main);
        }

        .odds-text-lbl {
            font-size: 10px;
            color: var(--text-secondary);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 2px;
        }

        .btn-matrix {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            width: 100%;
            margin-bottom: 12px;
        }

        .matrix-btn {
            background: #1c1f2b;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
        }

        .btn-roll {
            width: 100%;
            background-color: var(--accent-yellow);
            color: #000000;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 16px;
            box-shadow: 0 4px 12px rgba(255, 183, 0, 0.2);
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 14px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* --- INVENTORY VIEW (CLICKER) --- */
        .coin-tap-zone {
            width: 140px;
            height: 140px;
            background-color: var(--accent-yellow);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            margin: 20px 0;
            box-shadow: 0 0 25px rgba(255, 183, 0, 0.4);
            transition: transform 0.05s ease;
        }

        .coin-tap-zone:active {
            transform: scale(0.95);
        }

        .coin-inner-asset {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #cfcfcf, #6e6e6e);
            border-radius: 50%;
            border: 3px solid #ffffff;
        }

        .stats-row {
            display: flex;
            justify-content: space-around;
            width: 100%;
            margin: 16px 0;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 16px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-val {
            font-size: 18px;
            font-weight: 700;
        }

        .stat-lbl {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .backpack-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .section-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }

        .backpack-empty-box {
            background-color: #12141a;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 30px 16px;
            text-align: center;
            color: #4a4f5d;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- TOP APP BAR -->
        <div class="header">
            <div class="balance-container">
                <span class="coin-icon"></span>
                <span id="balance-display">0.0 U</span>
            </div>
            <div class="header-buttons">
                <button class="btn-badge">📍 Index</button>
                <button class="btn-badge btn-reset" onclick="resetData()">Reset</button>
            </div>
        </div>

        <!-- TABS NAV -->
        <div class="nav-tabs">
            <button class="tab-btn" onclick="switchTab('cases')">📦 Cases</button>
            <button class="tab-btn" onclick="switchTab('upgrader')">⚡ Upgrader</button>
            <button class="tab-btn active" onclick="switchTab('inventory')">🎒 Inventory</button>
        </div>

        <!-- TABS PANELS -->
        <!-- 1. CASES -->
        <div id="tab-cases" class="tab-content">
            <div class="cases-placeholder">
                <p>No item cases currently available.</p>
            </div>
        </div>

        <!-- 2. UPGRADER -->
        <div id="tab-upgrader" class="tab-content">
            <div class="upgrader-grid">
                <div class="select-box">Select Wager</div>
                <div class="select-box">Select Target</div>
            </div>

            <div class="odds-circle-container">
                <svg class="odds-circle-svg" width="160" height="160">
                    <circle cx="80" cy="80" r="70" fill="transparent" stroke="#232733" stroke-width="8"/>
                    <circle cx="80" cy="80" r="70" fill="transparent" stroke="#ff4a4a" stroke-width="8" stroke-dasharray="440" stroke-dashoffset="440"/>
                </svg>
                <div class="odds-text-pct">0.00%</div>
                <div class="odds-text-lbl">Win Odds</div>
            </div>

            <div class="btn-matrix">
                <button class="matrix-btn">2x</button>
                <button class="matrix-btn">5x</button>
                <button class="matrix-btn">10x</button>
            </div>
            <div class="btn-matrix">
                <button class="matrix-btn">35%</button>
                <button class="matrix-btn">55%</button>
                <button class="matrix-btn">75%</button>
            </div>

            <button class="btn-roll">⚡ Roll Upgrade</button>

            <label class="checkbox-container">
                <input type="checkbox"> Fast Upgrade (Skip Animation)
            </label>
        </div>

        <!-- 3. INVENTORY -->
        <div id="tab-inventory" class="tab-content active">
            <!-- COIN CLICKER TARGET -->
            <div class="coin-tap-zone" onclick="handleTapCoin()">
                <div class="coin-inner-asset"></div>
            </div>

            <div class="stats-row">
                <div class="stat-item">
                    <div class="stat-val">0</div>
                    <div class="stat-lbl">Upgrades Processed</div>
                </div>
                <div class="stat-item">
                    <div class="stat-val">0</div>
                    <div class="stat-lbl">Backpack Items</div>
                </div>
            </div>

            <div class="backpack-section">
                <div class="section-title">STORAGE BACKPACK:</div>
                <div class="backpack-empty-box">
                    Backpack is empty. Roll cases or tap the coin to start!
                </div>
            </div>
        </div>

    </div>

    <!-- MAIN PROGRAM LOGIC -->
    <script>
        // Initialize Telegram Mini App framework context
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Expands app window to full height inside Telegram

        // Main reactive app global state
        let appState = {
            coins: 0.0
        };

        // --- CLOUD SYNC LOGIC ---
        // Loads cross-device values instantly from Telegram CloudStorage
        function fetchCloudData() {
            tg.CloudStorage.getItem('user_coins', (error, value) => {
                if (!error && value) {
                    appState.coins = parseFloat(value);
                } else {
                    appState.coins = 0.0; // Fallback fallback values for completely new profile accounts
                }
                updateUIBalance();
            });
        }

        // Writes updated account balances directly to Cloud storage buckets
        function syncDataToCloud() {
            tg.CloudStorage.setItem('user_coins', appState.coins.toString(), (error, success) => {
                if (!success) {
                    console.error("Cloud synchronization interrupted: ", error);
                }
            });
        }

        // --- INTERACTION LOGIC ---
        function handleTapCoin() {
            appState.coins += 1.0;
            updateUIBalance();
            syncDataToCloud(); // Keeps cloud perfectly current when actions hit
        }

        function updateUIBalance() {
            document.getElementById('balance-display').innerText = `${appState.coins.toFixed(1)} U`;
        }

        function resetData() {
            appState.coins = 0.0;
            updateUIBalance();
            syncDataToCloud();
        }

        // --- VIEWPORT ROUTING TAB SWITCHER ---
        function switchTab(tabId) {
            // Remove active status indicators on buttons and viewport elements
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            // Match active states to chosen route parameter targets
            const selectedContent = document.getElementById(`tab-${tabId}`);
            if (selectedContent) {
                selectedContent.classList.add('active');
            }
            
            // Set dynamic highlighted status matching target selections 
            const targetButton = Array.from(document.querySelectorAll('.tab-btn')).find(btn => btn.innerText.toLowerCase().includes(tabId));
            if (targetButton) {
                targetButton.classList.add('active');
            }
        }

        // Start cloud initialization sequences right as document parser yields control
        window.onload = () => {
            fetchCloudData();
        };
    </script>
</body>
</html>
