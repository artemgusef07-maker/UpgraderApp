<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek Simulator</title>
    <style>
        /* ==========================================================================
           MINIMALIST DARK THEMING & TRANSITIONS
           ========================================================================== */
        :root {
            --bg-main: #0b0b0f;
            --bg-card: #12121a;
            --bg-inner: #181824;
            --border-color: #222230;
            --accent-gold: #ffb300;
            --accent-green: #2ecc71;
            --accent-red: #e74c3c;
            --text-main: #e2e2e9;
            --text-muted: #6c6c84;
            --radius: 8px;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-main); color: var(--text-main);
            user-select: none; -webkit-user-select: none;
        }

        .app-wrapper {
            max-width: 520px; margin: 0 auto;
            background-color: var(--bg-card); min-height: 100vh;
            display: flex; flex-direction: column;
            box-shadow: 0 0 40px rgba(0,0,0,0.8); position: relative;
        }

        /* PREMIUM HEADER DESIGN */
        .app-header {
            background-color: rgba(18, 18, 26, 0.85);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: 16px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100;
        }

        .balance-box {
            font-size: 19px; font-weight: 700; color: var(--accent-gold);
            display: flex; align-items: center; gap: 6px; letter-spacing: -0.5px;
        }

        .header-controls { display: flex; gap: 8px; }
        
        .btn-action {
            background: var(--bg-inner); color: var(--text-main);
            border: 1px solid var(--border-color); padding: 7px 14px;
            border-radius: var(--radius); cursor: pointer; font-weight: 600; font-size: 12px;
            transition: var(--transition); letter-spacing: 0.3px;
        }
        .btn-action:hover { background: #1f1f2e; border-color: #33334d; }
        .btn-reset { color: var(--accent-red); border-color: rgba(231,76,60,0.2); }
        .btn-reset:hover { background: rgba(231,76,60,0.1); border-color: var(--accent-red); }

        /* MINIMALIST SMOOTH TABS */
        .nav-tabs-bar { display: flex; background: #0e0e14; padding: 4px; margin: 12px 16px; border-radius: 10px; }
        
        .tab-trigger {
            flex: 1; text-align: center; padding: 10px 0; cursor: pointer; font-weight: 600;
            color: var(--text-muted); background: none; border: none; font-size: 13px;
            border-radius: 8px; transition: var(--transition);
        }
        .tab-trigger.active { color: #fff; background: var(--bg-card); box-shadow: 0 2px 8px rgba(0,0,0,0.4); }

        .tab-viewport { flex: 1; padding: 0 16px 24px 16px; overflow-y: auto; }
        .tab-view { display: none; }
        .tab-view.active-view { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

        /* UNIFIED GRID LAYOUTS */
        .display-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }

        .case-element-card {
            background: var(--bg-inner); border: 1px solid var(--border-color);
            border-radius: var(--radius); padding: 16px; display: flex;
            justify-content: space-between; align-items: center; cursor: pointer;
            transition: var(--transition);
        }
        .case-element-card:hover { border-color: #33334d; transform: translateY(-1px); }
        .case-name { font-weight: 600; font-size: 14px; color: #fff; }
        .case-cost { font-size: 12px; color: var(--accent-gold); font-weight: 700; background: rgba(255,179,0,0.08); padding: 4px 8px; border-radius: 6px; }

        /* UPGRADER LAYOUT MECHANICS */
        .upgrader-suite { display: flex; flex-direction: column; gap: 16px; }
        
        .docking-bay { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .dock-slot {
            padding: 12px; border-radius: var(--radius); text-align: center;
            font-size: 13px; display: flex; flex-direction: column; justify-content: center;
            align-items: center; min-height: 44px; font-weight: 600; transition: var(--transition);
        }
        .dock-slot.empty { background: var(--bg-inner); border: 1px dashed #2b2b3d; color: var(--text-muted); }
        .dock-slot.active { background: #1a1a26; border: 1px solid var(--accent-gold); color: #fff; }

        .engine-deck {
            display: grid; grid-template-columns: 1.1fr 1.3fr 1.1fr; gap: 12px;
            background: var(--bg-inner); padding: 14px; border-radius: 12px; border: 1px solid var(--border-color);
        }
        .deck-column { display: flex; flex-direction: column; gap: 8px; }
        .deck-title { text-align: center; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        
        .scroll-tray {
            height: 240px; overflow-y: auto; background: rgba(0,0,0,0.2);
            padding: 6px; border-radius: var(--radius); display: flex; flex-direction: column; gap: 6px;
        }

        .item-capsule {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 6px; padding: 10px; display: flex; align-items: center;
            justify-content: space-between; cursor: pointer; font-size: 12px; transition: var(--transition);
        }
        .item-capsule:hover { border-color: #3a3a52; }
        .item-capsule.selected { border-color: var(--accent-gold); background: #1c1c2b; }
        .cap-value { font-weight: 700; color: var(--accent-gold); }
        .btn-sell-quick { background: none; border: none; color: var(--accent-red); font-size: 10px; cursor: pointer; padding: 2px 0; font-weight: 600; }

        /* THE CHANCE RADAR CORES */
        .radar-center-hub { display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .circular-radar {
            width: 130px; height: 130px; border-radius: 50%; background: var(--accent-red);
            position: relative; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4); transition: background 0.3s ease;
        }
        .radar-inner-shield { width: 96px; height: 96px; border-radius: 50%; background: var(--bg-inner); z-index: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .radar-indicator-needle { width: 3px; height: 60px; background: #fff; position: absolute; bottom: 50%; left: calc(50% - 1.5px); transform-origin: bottom center; z-index: 3; border-radius: 2px; }

        .control-row { display: flex; gap: 4px; width: 100%; margin-top: 4px; }
        .btn-preset { flex: 1; padding: 6px 2px; font-size: 11px; background: var(--bg-card); border: 1px solid var(--border-color); color: #fff; font-weight: bold; border-radius: 4px; cursor: pointer; transition: var(--transition); }
        .btn-preset:hover { background: #1d1d2b; border-color: #44445c; }

        .execution-block { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
        .btn-trigger-launch { background: var(--accent-gold); color: #000; border: none; padding: 14px; border-radius: var(--radius); font-weight: 700; font-size: 14px; cursor: pointer; width: 100%; transition: var(--transition); }
        .btn-trigger-launch:disabled { background: #222230; color: var(--text-muted); cursor: not-allowed; }
        
        /* COIN INTERACTIVE (INVENTORY TAB) */
        .generator-station { display: flex; flex-direction: column; align-items: center; padding: 24px 0; background: var(--bg-inner); border-radius: 12px; margin-bottom: 16px; border: 1px solid var(--border-color); }
        .interactive-coin { width: 100px; height: 100px; background: linear-gradient(135deg, #ffca28, #d4af37); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; cursor: pointer; box-shadow: 0 6px 0 #b59426, 0 10px 20px rgba(0,0,0,0.3); transition: transform 0.05s; }
        .interactive-coin:active { transform: translateY(4px); box-shadow: 0 2px 0 #b59426, 0 4px 10px rgba(0,0,0,0.3); }

        .metrics-grid { display: flex; width: 90%; justify-content: space-around; margin-top: 20px; border-top: 1px solid var(--border-color); padding-top: 14px; font-size: 12px; color: var(--text-muted); font-weight: 600; }
        .metric-value { display: block; font-size: 16px; font-weight: 700; color: #fff; margin-top: 2px; }

        /* OVERLAYS & DIALOGS MODALS */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5,5,8,0.85); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 1000; transition: opacity 0.2s ease; }
        .modal-panel { background: var(--bg-card); padding: 24px; border-radius: 16px; border: 1px solid var(--border-color); width: 88%; max-width: 420px; box-sizing: border-box; }
        
        .button-group-row { display: flex; gap: 6px; margin: 16px 0; }
        .btn-selector { flex: 1; padding: 10px; background: var(--bg-inner); border: 1px solid var(--border-color); color: var(--text-main); font-weight: 600; border-radius: 6px; cursor: pointer; transition: var(--transition); }
        .btn-selector.active { background: var(--accent-gold); color: #000; border-color: var(--accent-gold); }
        
        .scroll-list-panel { max-height: 160px; overflow-y: auto; background: rgba(0,0,0,0.2); padding: 8px; border-radius: var(--radius); margin-bottom: 16px; }
        .list-row-entry { display: flex; justify-content: space-between; padding: 8px 4px; font-size: 13px; border-bottom: 1px solid var(--border-color); }

        /* MULTI-ROW VIEWPORTS SPEED RUNNERS */
        .lane-viewport { position: relative; width: 100%; height: 64px; overflow: hidden; background: #09090d; margin-bottom: 8px; border-radius: 6px; border: 1px solid var(--border-color); }
        .lane-crosshair { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: var(--accent-gold); z-index: 10; transform: translateX(-50%); }
        .lane-conveyor { display: flex; width: max-content; transform: translateX(0); }
        .lane-box-node { width: 64px; height: 64px; display: flex; align-items: center; justify-content: center; font-size: 24px; background: var(--bg-inner); border-right: 1px solid #09090d; flex-shrink: 0; box-sizing: border-box; }

        .rewards-matrix-box { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; max-height: 100px; overflow-y: auto; margin-top: 12px; }
        .reward-pill { background: var(--bg-inner); border: 1px solid var(--border-color); border-radius: 6px; width: 44px; height: 44px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 16px; }
        .btn-modal-primary { width: 100%; padding: 12px; background: var(--accent-green); color: #fff; border: none; border-radius: var(--radius); font-weight: 700; cursor: pointer; font-size: 14px; transition: var(--transition); }
        .btn-modal-cancel { width: 100%; padding: 12px; background: none; border: 1px solid var(--border-color); color: var(--text-muted); border-radius: var(--radius); font-weight: 600; cursor: pointer; margin-top: 8px; font-size: 13px; }
    </style>
</head>
<body>

    <div class="app-wrapper">
        
        <!-- HEADER COMPONENT -->
        <div class="app-header">
            <div class="balance-box">
                <span>🪙</span><span id="balanceDisplay">500.0</span><span>U</span>
            </div>
            <div class="header-controls">
                <button class="btn-action" onclick="openIndexModal()">🎴 INDEX</button>
                <button class="btn-action btn-reset" onclick="clearLegacyData()">RESET</button>
            </div>
        </div>

        <!-- NAVIGATION CONTROLLER -->
        <div class="nav-tabs-bar">
            <button id="btn-casesTab" class="tab-trigger active" onclick="switchTab('casesTab')">📦 CASES</button>
            <button id="btn-upgraderTab" class="tab-trigger" onclick="switchTab('upgraderTab')">⚡ UPGRADER</button>
            <button id="btn-profileTab" class="tab-trigger" onclick="switchTab('profileTab')">🎒 INVENTORY</button>
        </div>

        <!-- MAIN SPAWN WINDOW -->
        <div class="tab-viewport">
            
            <!-- CASES PANEL -->
            <div id="casesTab" class="tab-view active-view">
                <div id="caseMenuGrid" class="display-grid"></div>
            </div>

            <!-- UPGRADER CONTROLLER -->
            <div id="upgraderTab" class="tab-view">
                <div class="upgrader-suite">
                    
                    <div class="docking-bay">
                        <div id="stageWager" class="dock-slot empty">Select Wager</div>
                        <div id="stageTarget" class="dock-slot empty">Select Target</div>
                    </div>

                    <div class="engine-deck">
                        <div class="deck-column">
                            <span class="deck-title">Wagers</span>
                            <div id="wagerGrid" class="scroll-tray"></div>
                        </div>

                        <div class="radar-center-hub">
                            <div id="upgraderWheel" class="circular-radar">
                                <div id="wheelPointer" class="radar-indicator-needle"></div>
                                <div class="radar-inner-shield">
                                    <span id="chanceDisplay">0.00%</span>
                                    <span style="font-size: 9px; color: var(--text-muted); text-transform: uppercase;">Win Odds</span>
                                </div>
                            </div>
                            
                            <!-- Updated Presets Controls Grid -->
                            <div class="control-row">
                                <button class="btn-preset" onclick="applyPresetMultiplier(2)">2x</button>
                                <button class="btn-preset" onclick="applyPresetMultiplier(5)">5x</button>
                                <button class="btn-preset" onclick="applyPresetMultiplier(10)">10x</button>
                            </div>
                            <div class="control-row">
                                <button class="btn-preset" onclick="applyPresetChance(35)">35%</button>
                                <button class="btn-preset" onclick="applyPresetChance(55)">55%</button>
                                <button class="btn-preset" onclick="applyPresetChance(75)">75%</button>
                            </div>
                        </div>

                        <div class="deck-column">
                            <span class="deck-title">Targets</span>
                            <div id="targetGrid" class="scroll-tray"></div>
                        </div>
                    </div>

                    <div class="execution-block">
                        <button id="upgradeBtn" class="btn-trigger-launch" onclick="attemptUpgrade()">START CALCULATED UPGRADE</button>
                        <div style="display:flex; justify-content:center; gap:6px; font-size:12px; color:var(--text-muted);">
                            <input type="checkbox" id="fastUpgrade" style="cursor:pointer;">
                            <label style="cursor:pointer;" for="fastUpgrade">Instant Resolution Matrix</label>
                        </div>
                    </div>

                </div>
            </div>

            <!-- INVENTORY PROFILE HOVER LAYER -->
            <div id="profileTab" class="tab-view">
                <div class="generator-station">
                    <div class="interactive-coin" onclick="clickCoin()">🪙</div>
                    <div class="metrics-grid">
                        <div style="text-align:center;">Upgrades Processed<span id="statUpgrades" class="metric-value">0</span></div>
                        <div style="text-align:center;">Vault Holdings<span id="statItemsCount" class="metric-value">0</span></div>
                    </div>
                </div>

                <div style="font-size: 11px; font-weight: 700; margin-bottom: 8px; color: var(--text-muted); text-transform:uppercase; letter-spacing:0.5px;">Storage Safe Units:</div>
                <div id="profileInventory" class="display-grid" style="grid-template-columns: repeat(3, 1fr); gap:6px; max-height: 280px; overflow-y: auto; background:rgba(0,0,0,0.15); padding:8px; border-radius:var(--radius);"></div>
            </div>

        </div>

    </div>

    <!-- INSPECT POPUP BOX OVERLAY -->
    <div id="caseDetailsModal" class="modal-overlay" style="display:none;">
        <div class="modal-panel">
            <div id="inspectCaseName" class="roller-title" style="font-size:16px; font-weight:700; text-align:center; margin-bottom:12px;">Inspection Box</div>
            <div class="scroll-list-panel" id="inspectItemsList"></div>

            <div style="font-size: 11px; color: var(--text-muted); font-weight: 700; margin-bottom: 6px; text-transform:uppercase;">Drop Multi-Batch Value:</div>
            <div class="button-group-row">
                <button id="qty-1" class="btn-selector active" onclick="setUnboxQuantity(1)">1x</button>
                <button id="qty-2" class="btn-selector" onclick="setUnboxQuantity(2)">2x</button>
                <button id="qty-3" class="btn-selector" onclick="setUnboxQuantity(3)">3x</button>
                <button id="qty-4" class="btn-selector" onclick="setUnboxQuantity(4)">4x</button>
                <button id="qty-5" class="btn-selector" onclick="setUnboxQuantity(5)">5x</button>
            </div>

            <button class="btn-modal-primary" style="background:var(--accent-gold); color:#000;" onclick="confirmCasePurchase()">
                ACQUIRE FOR <span id="totalCaseCostDisplay">0</span> U
            </button>
            <button class="btn-modal-cancel" onclick="closeInspectModal()">DISMISS</button>
        </div>
    </div>

    <!-- MACHINE CALCULATOR DISPLAY UNBOX SYSTEM -->
    <div id="unboxingModal" class="modal-overlay" style="display:none;">
        <div class="modal-panel" style="max-width:440px;">
            <div id="rollerCaseTitle" class="roller-title" style="font-size:15px; font-weight:700; text-align:center; margin-bottom:12px;">Unboxing Processing...</div>
            <div id="multiRollersWrapper"></div>
            <div id="multiResultsContainer" class="rewards-matrix-box"></div>
            <div id="modalClaimBtn" style="margin-top:16px; display:none;">
                <button class="btn-modal-primary" onclick="closeUnboxModal()">TRANSFER TO BACKPACK</button>
            </div>
        </div>
    </div>

    <!-- BOOK INDEX MODAL -->
    <div id="itemIndexModal" class="modal-overlay" style="display:none; z-index:9999;">
        <div class="modal-panel" style="max-width:420px; max-height:80vh; display:flex; flex-direction:column;">
            <div class="roller-title" style="font-size:16px; font-weight:700; text-align:center; margin-bottom:4px;">Item Index Archive</div>
            <div style="color:var(--text-muted); font-size:12px; margin-bottom:16px; text-align:center;">Historical log book trackers</div>
            <div id="indexGrid" style="display:grid; grid-template-columns: repeat(4, 1fr); gap: 6px; overflow-y:auto; flex:1; padding-right:2px;"></div>
            <button class="btn-modal-cancel" onclick="closeIndexModal()" style="margin-top:16px; width:100%;">CLOSE CATALOGUE</button>
        </div>
    </div>

    <!-- LOADS DEFINED DATABASES -->
    <script src="itemPool.js"></script>
    <script src="app.js"></script>
</body>
</html>
